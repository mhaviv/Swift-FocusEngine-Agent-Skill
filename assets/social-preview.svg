<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="50%" style="stop-color:#16213e"/>
      <stop offset="100%" style="stop-color:#0f3460"/>
    </linearGradient>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#007AFF"/>
      <stop offset="100%" style="stop-color:#5856D6"/>
    </linearGradient>
    <linearGradient id="ring" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#007AFF;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#5856D6;stop-opacity:0.8"/>
    </linearGradient>
    <linearGradient id="ringGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#007AFF;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#5856D6;stop-opacity:0.15"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1280" height="640" fill="url(#bg)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.03">
    <line x1="0" y1="80" x2="1280" y2="80" stroke="white" stroke-width="1"/>
    <line x1="0" y1="160" x2="1280" y2="160" stroke="white" stroke-width="1"/>
    <line x1="0" y1="240" x2="1280" y2="240" stroke="white" stroke-width="1"/>
    <line x1="0" y1="320" x2="1280" y2="320" stroke="white" stroke-width="1"/>
    <line x1="0" y1="400" x2="1280" y2="400" stroke="white" stroke-width="1"/>
    <line x1="0" y1="480" x2="1280" y2="480" stroke="white" stroke-width="1"/>
    <line x1="0" y1="560" x2="1280" y2="560" stroke="white" stroke-width="1"/>
    <line x1="160" y1="0" x2="160" y2="640" stroke="white" stroke-width="1"/>
    <line x1="320" y1="0" x2="320" y2="640" stroke="white" stroke-width="1"/>
    <line x1="480" y1="0" x2="480" y2="640" stroke="white" stroke-width="1"/>
    <line x1="640" y1="0" x2="640" y2="640" stroke="white" stroke-width="1"/>
    <line x1="800" y1="0" x2="800" y2="640" stroke="white" stroke-width="1"/>
    <line x1="960" y1="0" x2="960" y2="640" stroke="white" stroke-width="1"/>
    <line x1="1120" y1="0" x2="1120" y2="640" stroke="white" stroke-width="1"/>
  </g>

  <!-- Large focus ring icon (background decoration) -->
  <circle cx="200" cy="320" r="260" fill="none" stroke="url(#ringGlow)" stroke-width="40" opacity="0.3"/>

  <!-- Focus ring icon -->
  <g transform="translate(490, 150)">
    <!-- Outer glow -->
    <rect x="-8" y="-8" width="96" height="96" rx="24" fill="none" stroke="url(#ringGlow)" stroke-width="16"/>
    <!-- Focus ring -->
    <rect x="0" y="0" width="80" height="80" rx="20" fill="none" stroke="url(#ring)" stroke-width="5"/>
    <!-- Inner element -->
    <rect x="20" y="20" width="40" height="40" rx="8" fill="url(#grad)" opacity="0.6"/>
    <!-- Focus indicator arrows -->
    <polygon points="40,-18 34,-8 46,-8" fill="url(#grad)" opacity="0.7"/>
    <polygon points="40,98 34,88 46,88" fill="url(#grad)" opacity="0.7"/>
    <polygon points="-18,40 -8,34 -8,46" fill="url(#grad)" opacity="0.7"/>
    <polygon points="98,40 88,34 88,46" fill="url(#grad)" opacity="0.7"/>
  </g>

  <!-- Title -->
  <text x="600" y="310" font-family="-apple-system, SF Pro Display, Helvetica Neue, sans-serif" font-size="72" font-weight="700" fill="url(#grad)" text-anchor="start">Swift FocusEngine</text>
  <text x="600" y="370" font-family="-apple-system, SF Pro Display, Helvetica Neue, sans-serif" font-size="48" font-weight="500" fill="url(#grad)">Pro</text>
  <text x="700" y="370" font-family="-apple-system, SF Pro Display, Helvetica Neue, sans-serif" font-size="28" font-weight="400" fill="#86868B">Agent Skill</text>

  <!-- Description -->
  <text x="600" y="420" font-family="-apple-system, SF Pro Display, Helvetica Neue, sans-serif" font-size="22" font-weight="400" fill="#a0a0b0">Focus management for all Apple platforms</text>

  <!-- Platform badges -->
  <g transform="translate(600, 460)">
    <!-- tvOS -->
    <rect x="0" y="0" width="80" height="32" rx="6" fill="white" fill-opacity="0.1" stroke="white" stroke-opacity="0.2" stroke-width="1"/>
    <text x="40" y="21" font-family="-apple-system, SF Pro Display, Helvetica Neue, sans-serif" font-size="14" font-weight="500" fill="#e0e0e0" text-anchor="middle">tvOS</text>

    <!-- iOS -->
    <rect x="92" y="0" width="64" height="32" rx="6" fill="white" fill-opacity="0.1" stroke="white" stroke-opacity="0.2" stroke-width="1"/>
    <text x="124" y="21" font-family="-apple-system, SF Pro Display, Helvetica Neue, sans-serif" font-size="14" font-weight="500" fill="#e0e0e0" text-anchor="middle">iOS</text>

    <!-- watchOS -->
    <rect x="168" y="0" width="96" height="32" rx="6" fill="white" fill-opacity="0.1" stroke="white" stroke-opacity="0.2" stroke-width="1"/>
    <text x="216" y="21" font-family="-apple-system, SF Pro Display, Helvetica Neue, sans-serif" font-size="14" font-weight="500" fill="#e0e0e0" text-anchor="middle">watchOS</text>

    <!-- visionOS -->
    <rect x="276" y="0" width="96" height="32" rx="6" fill="white" fill-opacity="0.1" stroke="white" stroke-opacity="0.2" stroke-width="1"/>
    <text x="324" y="21" font-family="-apple-system, SF Pro Display, Helvetica Neue, sans-serif" font-size="14" font-weight="500" fill="#e0e0e0" text-anchor="middle">visionOS</text>
  </g>

  <!-- Framework tags -->
  <g transform="translate(600, 510)">
    <text x="0" y="16" font-family="-apple-system, SF Pro Display, Helvetica Neue, sans-serif" font-size="16" font-weight="400" fill="#6e6e80">SwiftUI  ·  UIKit  ·  RealityKit</text>
  </g>

  <!-- Author -->
  <text x="600" y="580" font-family="-apple-system, SF Pro Display, Helvetica Neue, sans-serif" font-size="18" font-weight="400" fill="#6e6e80">by Michael Haviv</text>

  <!-- Bottom accent line -->
  <rect x="0" y="630" width="1280" height="10" fill="url(#grad)" opacity="0.6"/>
</svg>
